name: SecureMind RAG CI / Deploy

"on":
  workflow_dispatch:
    inputs:
      run_production_verify:
        description: "Verify the existing AgentBase runtime after CI checks"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    paths:
      - "chatbot.py"
      - "rag_core.py"
      - "answer_engine.py"
      - "intent_router.py"
      - "catalog_service.py"
      - "catalog_metadata.py"
      - "document_code_utils.py"
      - "document_evidence_metadata.py"
      - "context_budget.py"
      - "text_utils.py"
      - "memory.py"
      - "predeploy_check.py"
      - "ingest.py"
      - "build_document_catalog.py"
      - "sharepoint_sync.py"
      - "config.py"
      - "requirements.txt"
      - "constraints.txt"
      - "Dockerfile"
      - "static/**"
      - "teams_bot.py"
      - "scripts/**"
      - ".github/workflows/**"
      - "SECURITY.md"
      - "SHAREPOINT_AUTO_UPDATE_PIPELINE.md"
      - "LOCAL_KNOWLEDGE_UPDATE.md"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      VECTOR_DB_DIR: vector_db
      PAPERS_DIR: sharepoint_downloads
      EMBEDDING_MODEL: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      CHUNK_SIZE: "1500"
      CHUNK_OVERLAP: "250"
      SEMANTIC_CHUNKING_ENABLED: "false"
      RETRIEVAL_K: "4"
      RETRIEVAL_FETCH_K: "20"
      MIN_RELEVANCE_SCORE: "1.2"
      MAX_TOKENS: "8192"
      MAX_CONTEXT_CHARS: "5000"
      SHOW_USAGE: "false"
      DEBUG_RETRIEVAL: "false"
      ANSWER_LANGUAGE: vi
      AGENTBASE_ENDPOINT_URL: ${{ secrets.AGENTBASE_ENDPOINT_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Block interactive SharePoint sync in CI
        shell: bash
        run: |
          set -euo pipefail
          if [ "${MS_AUTH_FLOW:-}" = "device_code" ]; then
            echo "device_code is interactive and not supported in GitHub Actions. Run SharePoint sync locally instead."
            exit 1
          fi
          echo "SharePoint sync is local-only. CI will not call Microsoft Graph SharePoint endpoints."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run repository security audit
        run: python scripts/security_audit.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch==2.12.0+cpu"
          python -m pip install --extra-index-url https://download.pytorch.org/whl/cpu -c constraints.txt -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile \
            config.py \
            ingest.py \
            build_document_catalog.py \
            document_intelligence.py \
            catalog_service.py \
            catalog_metadata.py \
            document_code_utils.py \
            document_evidence_metadata.py \
            context_budget.py \
            text_utils.py \
            memory.py \
            intent_router.py \
            answer_engine.py \
            rag_core.py \
            chatbot.py \
            sharepoint_sync.py \
            teams_bot.py \
            predeploy_check.py \
            scripts/ci_smoke_test.py \
            scripts/golden_regression_test.py \
            scripts/local_refresh_knowledge.py \
            scripts/production_verify.py \
            scripts/security_audit.py

      - name: Run catalog-only smoke tests
        run: python scripts/ci_smoke_test.py --catalog-only

      - name: Verify existing production runtime
        if: ${{ inputs.run_production_verify == 'true' }}
        run: |
          if [ -z "${AGENTBASE_ENDPOINT_URL:-}" ]; then
            echo "AGENTBASE_ENDPOINT_URL secret is required for production verification."
            exit 1
          fi
          python scripts/production_verify.py --base-url "$AGENTBASE_ENDPOINT_URL"
