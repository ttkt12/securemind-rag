<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>GRC Copilot — ZaloPay Compliance / GRC</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260616-ui6">
</head>
<body>
  <div class="app-shell" id="app-shell">
    <div class="sidebar-scrim" id="sidebar-scrim" hidden></div>

    <aside class="control-rail" id="sidebar" aria-label="SecureMind RAG workspace">
      <header class="brand-block">
        <div class="brand-mark" aria-hidden="true">Z</div>
        <div class="brand-copy">
          <p class="brand-name">GRC Copilot</p>
          <p class="brand-subtitle">ZaloPay · Compliance / GRC</p>
        </div>
      </header>

      <section class="corpus-card" aria-label="Knowledge base status">
        <p class="eyebrow">Knowledge base</p>
        <div class="corpus-count">
          <span id="document-count">--</span>
          <span class="corpus-unit">documents</span>
        </div>
        <p class="corpus-note" id="corpus-note">Checking knowledge catalog…</p>
      </section>

      <section class="session-tools" aria-label="Chat controls">
        <button class="primary-action" id="new-chat" type="button">New chat</button>
        <button class="secondary-action" id="clear-sessions" type="button" title="Clear all local sessions">Clear</button>
      </section>

      <section class="session-block" aria-label="Chat sessions">
        <div class="section-heading">
          <p class="eyebrow">Sessions</p>
          <span class="session-count" id="session-count">0</span>
        </div>
        <div class="session-list" id="session-list"></div>
      </section>

      <section class="access-card" id="access-card" aria-label="App access token">
        <button class="access-toggle" id="access-toggle" type="button" aria-expanded="false">
          <span>Access token</span>
          <span class="access-state" id="access-state">Not set</span>
        </button>
        <div class="access-fields" id="access-fields" hidden>
          <label for="access-token">X-App-Access-Token · this browser session only</label>
          <div class="token-row">
            <input id="access-token" type="password" autocomplete="off" placeholder="Paste token">
            <button id="save-token" type="button">Save</button>
          </div>
          <button class="clear-token" id="clear-token" type="button" hidden>Clear token</button>
        </div>
      </section>
    </aside>

    <section class="chat-workspace" aria-label="SecureMind chat">
      <header class="chat-topbar">
        <button class="rail-toggle" id="sidebar-toggle" type="button" aria-label="Toggle sidebar" aria-expanded="false">
          <span aria-hidden="true"></span><span aria-hidden="true"></span><span aria-hidden="true"></span>
        </button>
        <div class="topbar-title">
          <p class="eyebrow">ZaloPay Compliance · GRC</p>
          <h1>GRC knowledge assistant</h1>
        </div>
        <div class="topbar-actions">
          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Chuyển chế độ sáng/tối" title="Chế độ sáng/tối">
            <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="4.2" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.6 4.6l2.1 2.1M17.3 17.3l2.1 2.1M19.4 4.6l-2.1 2.1M6.7 17.3l-2.1 2.1" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false"><path d="M20 14.5A8 8 0 0 1 9.5 4a7 7 0 1 0 10.5 10.5Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
          </button>
          <span class="status-pill" id="status-pill" data-state="ready">Ready</span>
        </div>
      </header>

      <div class="messages" id="messages" aria-live="polite" aria-label="Conversation"></div>

      <div class="composer-region">
        <div class="error-banner" id="error-banner" role="alert" hidden>
          <span id="error-text"></span>
          <button class="error-retry" id="error-retry" type="button">Retry</button>
        </div>
        <form class="composer" id="chat-form">
          <label class="sr-only" for="question">Question</label>
          <textarea
            id="question"
            name="question"
            rows="1"
            placeholder="Ask about an ISMS policy, procedure, scope, audit evidence, or a document code…"
            autocomplete="off"
            required
          ></textarea>
          <button id="send" class="send-button" type="submit" disabled aria-label="Send">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
              <path d="M4 12 20 4l-4 16-4-7-8-1Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>
            <span>Send</span>
          </button>
        </form>
        <p class="composer-hint">Enter to send · Shift+Enter for a new line · answers are grounded in indexed documents</p>
      </div>
    </section>
  </div>

  <script src="/static/app.js?v=20260616-ui6" defer></script>
</body>
</html>
