<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>SecureMind RAG</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="app-shell">
    <aside class="control-rail" aria-label="SecureMind RAG workspace">
      <header class="brand-block">
        <div class="brand-mark" aria-hidden="true">SM</div>
        <div class="brand-copy">
          <p class="brand-name">SecureMind RAG</p>
          <p class="brand-subtitle">ISMS Knowledge Assistant</p>
        </div>
      </header>

      <section class="corpus-card" aria-label="Knowledge base status">
        <p class="eyebrow">Corpus</p>
        <div class="corpus-count">
          <span id="document-count">--</span>
          <span>documents</span>
        </div>
        <p class="corpus-note" id="corpus-note">Checking knowledge catalog...</p>
      </section>

      <section class="access-card" id="access-card" aria-label="App access token">
        <button class="access-toggle" id="access-toggle" type="button" aria-expanded="false">
          Access token
          <span id="access-state">Not set</span>
        </button>
        <div class="access-fields" id="access-fields" hidden>
          <label for="access-token">X-App-Access-Token</label>
          <div class="token-row">
            <input id="access-token" type="password" autocomplete="off" placeholder="Paste token for this browser session">
            <button id="save-token" type="button">Save</button>
          </div>
          <button class="clear-token" id="clear-token" type="button">Clear token</button>
        </div>
      </section>

      <section class="session-tools" aria-label="Chat controls">
        <button class="primary-action" id="new-chat" type="button">New chat</button>
        <button class="secondary-action" id="clear-sessions" type="button">Clear</button>
      </section>

      <section class="session-block" aria-label="Chat sessions">
        <div class="section-heading">
          <p class="eyebrow">Sessions</p>
          <span id="session-count">0</span>
        </div>
        <div class="session-list" id="session-list"></div>
      </section>
    </aside>

    <section class="chat-workspace" aria-label="SecureMind chat">
      <header class="chat-topbar">
        <div>
          <p class="eyebrow">Internal security knowledge</p>
          <h1>Ask the ISMS knowledge base</h1>
        </div>
        <div class="topbar-actions">
          <span class="status-pill" id="status-pill">Ready</span>
          <button class="retry-button" id="retry-last" type="button" disabled>Retry</button>
        </div>
      </header>

      <div class="messages" id="messages" aria-live="polite" aria-label="Conversation"></div>

      <form class="composer" id="chat-form">
        <label class="sr-only" for="question">Question</label>
        <textarea
          id="question"
          name="question"
          rows="2"
          placeholder="Ask about ISO 27001, ISMS scope, password policy, audit evidence, or a document code"
          autocomplete="off"
          required
        ></textarea>
        <button id="send" class="send-button" type="submit" disabled>
          Send
        </button>
      </form>
    </section>
  </main>

  <script src="/static/app.js" defer></script>
</body>
</html>
